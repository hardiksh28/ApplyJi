<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B6EF6"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7B6EF6"/>
    </linearGradient>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="56" height="56" rx="14"/>
    </clipPath>
  </defs>

  <!-- Icon Box -->
  <rect x="0" y="12" width="56" height="56" rx="14" fill="url(#iconGrad)"/>

  <!-- Document lines inside icon -->
  <rect x="13" y="23" width="22" height="3" rx="1.5" fill="white" opacity="0.35"/>
  <rect x="13" y="30" width="30" height="3" rx="1.5" fill="white" opacity="0.35"/>
  <rect x="13" y="37" width="18" height="3" rx="1.5" fill="white" opacity="0.35"/>

  <!-- Arrow / rocket launch mark -->
  <circle cx="38" cy="50" r="10" fill="white" opacity="0.15"/>
  <path d="M33 55 L43 45 M43 45 L36 45 M43 45 L43 52" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Wordmark: Apply -->
  <text x="68" y="43" font-family="'Trebuchet MS', 'Gill Sans', sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5" fill="#FFFFFF">Apply</text>

  <!-- Wordmark: Ji — accented color -->
  <text x="155" y="43" font-family="'Trebuchet MS', 'Gill Sans', sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5" fill="#7B6EF6">Ji</text>

  <!-- Tagline -->
  <text x="69" y="58" font-family="'Trebuchet MS', 'Gill Sans', sans-serif" font-size="10.5" fill="#6B7280" letter-spacing="0.04em">Track every opportunity</text>

  <!-- Dot accent on tagline -->
  <circle cx="62" cy="55" r="2.5" fill="#7B6EF6" opacity="0.7"/>
</svg>
